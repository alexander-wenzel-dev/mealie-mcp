name: Claude Issue Triage

on:
  issues:
    types: [opened]

concurrency:
  group: claude-issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions: {}

jobs:
  triage:
    if: >
      github.actor == github.repository_owner &&
      toJSON(github.event.issue.labels) == '[]' &&
      !contains(github.event.issue.body, '@claude') &&
      !contains(github.event.issue.title, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Claude Code
        uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102 # v1.0.148
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: "/triage-issue REPO: ${{ github.repository }} ISSUE_NUMBER: ${{ github.event.issue.number }} TITLE: ${{ github.event.issue.title }} AUTHOR: ${{ github.event.issue.user.login }}"
          claude_args: |
            --model claude-sonnet-4-6
