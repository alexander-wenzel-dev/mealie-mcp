name: Claude Issue Triage

on:
  issues:
    types: [opened]

concurrency:
  group: claude-issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions: {}

jobs:
  triage:
    if: >
      github.actor == github.repository_owner &&
      toJSON(github.event.issue.labels) == '[]' &&
      !contains(github.event.issue.body, '@claude') &&
      !contains(github.event.issue.title, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Claude Code
        env:
          # Triage runs in agent mode and posts its classification with
          # gh issue comment/edit; GH_TOKEN authorises those calls.
          GH_TOKEN: ${{ github.token }}
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1.0.171
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/triage-issue REPO: ${{ github.repository }} ISSUE_NUMBER: ${{ github.event.issue.number }} TITLE: ${{ github.event.issue.title }} AUTHOR: ${{ github.event.issue.user.login }}"
          # No track_progress: that mode derives an implementation checklist from
          # the issue and drives the agent to build it. Triage only classifies.
          # Tools are pinned to the read-and-label surface the skill needs, so the
          # run cannot edit code or open a PR even if it tried.
          claude_args: |
            --model claude-sonnet-5
            --allowedTools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*),Bash(gh search issues:*),Read,Glob,Grep"
