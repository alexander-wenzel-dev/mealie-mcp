name: Claude PR Review

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pull-request-number:
        description: PR number to review.
        required: true
        type: string
      model:
        description: Claude model to use for the review.
        required: false
        default: claude-sonnet-5
        type: choice
        options:
          - claude-sonnet-5
          - claude-opus-4-8

concurrency:
  # Any issue_comment on the PR enters this group, regardless of author, and the
  # group is evaluated before the job if-gate. Cancelling here would let any
  # commenter, or the review's own tracking comment, kill an in-flight review.
  # Queue instead so a running review always finishes.
  group: claude-pr-review-${{ github.event.issue.number || inputs.pull-request-number }}
  cancel-in-progress: false

permissions: {}

jobs:
  review:
    # Owner-gated, manual only: a /review-pr comment on the PR, or a manual
    # dispatch. Never fires automatically.
    if: >
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.login == github.repository_owner &&
        contains(github.event.comment.body, '/review-pr')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    env:
      PR_NUMBER: ${{ github.event.issue.number || inputs.pull-request-number }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: refs/pull/${{ env.PR_NUMBER }}/head

      - name: Run Claude Code
        env:
          # The dispatch path runs in agent mode (no tracking comment), so Claude
          # posts the review itself with gh pr comment. GH_TOKEN authorises that.
          GH_TOKEN: ${{ github.token }}
        uses: anthropics/claude-code-action@af0559ee4f514d1ef21826982bed13f7edc3c35e # v1.0.178
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # A /review-pr comment gets a fresh live tracking comment (tag mode);
          # dispatch runs agent mode. use_sticky_comment stays off so a new
          # comment is posted each run and prior reviews are kept.
          track_progress: ${{ github.event_name != 'workflow_dispatch' }}
          prompt: >-
            /review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ env.PR_NUMBER }}
            Posting the review is your final and mandatory action. A plain-text reply is discarded and never reaches the user, so the review only lands when you deliver it through the posting tool, and you do that last, even after the subagents return.
            Run the review subagents synchronously and collect their feedback in the same turn. Do not end your turn to wait for a background completion notification; this run has no wakeup to resume it.
            ${{ github.event_name == 'workflow_dispatch' && 'Inline comments are unavailable in this run, so post the whole review as one top-level comment with gh pr comment. Always post that comment, even if only to record that you found no blocking issues.' || 'Deliver the summary by updating your tracking comment; do not open a separate top-level comment. Update it even if only to record that you found no blocking issues.' }}
          claude_args: |
            --model ${{ inputs.model || 'claude-sonnet-5' }}
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Task,Read,Glob,Grep,WebFetch,WebSearch,Write"
